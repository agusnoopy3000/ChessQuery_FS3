# Overrides activos cuando SPRING_PROFILES_ACTIVE=aws

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: chessquery
    password: ${RABBITMQ_PASSWORD}
    connection-timeout: 10000
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          max-attempts: 5

  # SMTP real (p.ej. SES/SendGrid/Gmail). Sin SMTP_HOST queda "disabled" y el
  # envío cae a log (MockEmailService no rompe el flujo). Al cargar las
  # credenciales (SMTP_HOST/PORT/USERNAME/PASSWORD) empieza a enviar de verdad.
  mail:
    host: ${SMTP_HOST:disabled}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}

ms-users:
  url: ${MS_USERS_URL}

notifications:
  mail:
    from: ${MAIL_FROM:no-reply@chessquery.cl}

logging:
  level:
    root: INFO
    org.springframework: WARN
    cl.chessquery: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
