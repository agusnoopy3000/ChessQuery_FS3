spring:
  application:
    name: ms-users

  # ── Datasource ──────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/user_db}
    username: ${DB_USER:chessquery}
    password: ${DB_PASSWORD:chessquery_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  # ── JPA ─────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:chessquery}
    password: ${RABBITMQ_PASSWORD:chessquery_dev}
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 3

# ── Servidor ────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: never

# ── SpringDoc / Swagger ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    cl.chessquery.users: DEBUG
    org.springframework.amqp: WARN

# ── Actuator / Monitoring ───────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

---
# ── Perfil Docker ────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://user_db:5432/user_db
  rabbitmq:
    host: rabbitmq

---
# ── Perfil test (H2, Flyway deshabilitado, RabbitMQ mockeado) ─────────────
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  # Deshabilitar auto-config de RabbitMQ en tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
