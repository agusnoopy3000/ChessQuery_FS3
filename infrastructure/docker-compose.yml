# =============================================================================
# ChessQuery – Infraestructura local (desarrollo / demo)
#
# Object Storage: MinIO expuesto como S3-compatible.
#   - Los microservicios usan el AWS SDK apuntando a S3_ENDPOINT_URL en local.
#   - En producción basta con quitar S3_ENDPOINT_URL y cambiar las credenciales
#     a las de AWS IAM; el SDK se comporta igual.
#
# Microservicios Java y BFFs NO incluidos; se agregarán con sus Dockerfiles.
# =============================================================================

networks:
  chessquery-net:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes persistentes
# ---------------------------------------------------------------------------
volumes:
  # auth_db_data eliminado en migración a Supabase Auth (ver docker-compose.backup.yml)
  user_db_data:
  tournament_db_data:
  game_db_data:
  analytics_db_data:
  notif_db_data:
  etl_db_data:
  rabbitmq_data:
  redis_data:
  # minio_data eliminado en migración a Supabase Storage (ver docker-compose.backup.yml)

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # -------------------------------------------------------------------------
  # BASES DE DATOS – PostgreSQL 16
  # -------------------------------------------------------------------------

  # auth_db removido — Supabase Auth gestiona usuarios.
  # Para rollback: docker compose -f docker-compose.yml -f docker-compose.backup.yml up

  user_db:
    image: postgres:16-alpine
    container_name: chessquery_user_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-chessquery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      POSTGRES_DB: user_db
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chessquery} -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  tournament_db:
    image: postgres:16-alpine
    container_name: chessquery_tournament_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-chessquery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      POSTGRES_DB: tournament_db
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - tournament_db_data:/var/lib/postgresql/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chessquery} -d tournament_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  game_db:
    image: postgres:16-alpine
    container_name: chessquery_game_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-chessquery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      POSTGRES_DB: game_db
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - game_db_data:/var/lib/postgresql/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chessquery} -d game_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics_db:
    image: postgres:16-alpine
    container_name: chessquery_analytics_db
    restart: unless-stopped
    profiles: ["analytics"]
    environment:
      POSTGRES_USER: ${DB_USER:-chessquery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      POSTGRES_DB: analytics_db
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - analytics_db_data:/var/lib/postgresql/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chessquery} -d analytics_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  notif_db:
    image: postgres:16-alpine
    container_name: chessquery_notif_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-chessquery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      POSTGRES_DB: notif_db
    ports:
      - "127.0.0.1:5437:5432"
    volumes:
      - notif_db_data:/var/lib/postgresql/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chessquery} -d notif_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ms-etl + etl_db quedan opt-in via profile 'etl'. No se usan en el flujo
  # principal de la demo. Para levantarlos: docker compose --profile etl up -d
  etl_db:
    image: postgres:16-alpine
    container_name: chessquery_etl_db
    restart: unless-stopped
    profiles: ["etl"]
    environment:
      POSTGRES_USER: ${DB_USER:-chessquery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      POSTGRES_DB: etl_db
    ports:
      - "127.0.0.1:5438:5432"
    volumes:
      - etl_db_data:/var/lib/postgresql/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chessquery} -d etl_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # MICROSERVICIOS JAVA
  # -------------------------------------------------------------------------

  # ms-auth removido — Supabase Auth + API Gateway validan JWT directamente.
  # Para rollback: docker compose -f docker-compose.yml -f docker-compose.backup.yml up

  ms-users:
    build:
      context: ../ms-users
      dockerfile: Dockerfile
    container_name: chessquery_ms_users
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://user_db:5432/user_db
      DB_USER: ${DB_USER:-chessquery}
      DB_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-chessquery_dev}
      SERVER_PORT: "8081"
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      user_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 90s

  ms-tournament:
    build:
      context: ../ms-tournament
      dockerfile: Dockerfile
    container_name: chessquery_ms_tournament
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://tournament_db:5432/tournament_db
      DB_USER: ${DB_USER:-chessquery}
      DB_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-chessquery_dev}
      MS_USERS_URL: http://ms-users:8081
      SERVER_PORT: "8082"
    ports:
      - "127.0.0.1:8082:8082"
    depends_on:
      tournament_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 90s

  ms-game:
    build:
      context: ../ms-game
      dockerfile: Dockerfile
    container_name: chessquery_ms_game
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://game_db:5432/game_db
      DB_USER: ${DB_USER:-chessquery}
      DB_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-chessquery_dev}
      S3_BUCKET: ${S3_BUCKET:-chessquery-pgn}
      SERVER_PORT: "8083"
      # Supabase Storage — almacenamiento PGN (default)
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:54321}
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://127.0.0.1:54321}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-supabase}
    ports:
      - "127.0.0.1:8083:8083"
    depends_on:
      game_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 90s

  ms-analytics:
    build:
      context: ../ms-analytics
      dockerfile: Dockerfile
    container_name: chessquery_ms_analytics
    restart: unless-stopped
    profiles: ["analytics"]
    environment:
      DB_URL: jdbc:postgresql://analytics_db:5432/analytics_db
      DB_USER: ${DB_USER:-chessquery}
      DB_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-chessquery_dev}
      SERVER_PORT: "8084"
    ports:
      - "127.0.0.1:8084:8084"
    depends_on:
      analytics_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 90s

  ms-notifications:
    build:
      context: ../ms-notifications
      dockerfile: Dockerfile
    container_name: chessquery_ms_notifications
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://notif_db:5432/notif_db
      DB_USER: ${DB_USER:-chessquery}
      DB_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-chessquery_dev}
      SERVER_PORT: "8085"
      MS_USERS_URL: http://ms-users:8081
      # N2: SMTP a Inbucket de Supabase local (override en .env si usás Mailpit)
      SMTP_HOST: ${SMTP_HOST:-host.docker.internal}
      SMTP_PORT: ${SMTP_PORT:-54325}
    ports:
      - "127.0.0.1:8085:8085"
    depends_on:
      notif_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 90s

  # -------------------------------------------------------------------------
  # MICROSERVICIO PYTHON — ETL
  # -------------------------------------------------------------------------

  ms-etl:
    build:
      context: ../ms-etl
      dockerfile: Dockerfile
    container_name: chessquery_ms_etl
    restart: unless-stopped
    profiles: ["etl"]
    environment:
      DATABASE_URL: postgresql://${DB_USER:-chessquery}:${DB_PASSWORD:-chessquery_dev}@etl_db:5432/etl_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD:-chessquery_dev}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-ChessEvents}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-chessquery_dev}
      MS_USERS_URL: http://ms-users:8081
      ETL_FIDE_SHOULD_FAIL: ${ETL_FIDE_SHOULD_FAIL:-false}
      ETL_AJEFECH_SHOULD_FAIL: ${ETL_AJEFECH_SHOULD_FAIL:-false}
      ETL_LICHESS_SHOULD_FAIL: ${ETL_LICHESS_SHOULD_FAIL:-false}
      ETL_CHESS_RESULTS_SHOULD_FAIL: ${ETL_CHESS_RESULTS_SHOULD_FAIL:-false}
      AJEFECH_SYNC_ID_START: ${AJEFECH_SYNC_ID_START:-1}
      AJEFECH_SYNC_ID_END: ${AJEFECH_SYNC_ID_END:-30000}
      AJEFECH_SYNC_ID_STEP: ${AJEFECH_SYNC_ID_STEP:-50}
      AJEFECH_SYNC_CONCURRENCY: ${AJEFECH_SYNC_CONCURRENCY:-8}
      SERVER_PORT: "8086"
    ports:
      - "127.0.0.1:8086:8086"
    depends_on:
      etl_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8086/health',timeout=3); sys.exit(0 if r.status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -------------------------------------------------------------------------
  # BFFs (NestJS)
  # -------------------------------------------------------------------------

  bff-player:
    build:
      context: ../bff-player
      dockerfile: Dockerfile
    container_name: chessquery_bff_player
    restart: unless-stopped
    environment:
      PORT: "3001"
      MS_USERS_URL: http://ms-users:8081
      MS_TOURNAMENT_URL: http://ms-tournament:8082
      MS_GAME_URL: http://ms-game:8083
      MS_ANALYTICS_URL: http://ms-analytics:8084
      MS_NOTIFICATIONS_URL: http://ms-notifications:8085
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      - ms-users
      - ms-game
      - ms-notifications
    networks:
      - chessquery-net

  bff-organizer:
    build:
      context: ../bff-organizer
      dockerfile: Dockerfile
    container_name: chessquery_bff_organizer
    restart: unless-stopped
    environment:
      PORT: "3002"
      MS_USERS_URL: http://ms-users:8081
      MS_TOURNAMENT_URL: http://ms-tournament:8082
      MS_GAME_URL: http://ms-game:8083
      MS_ANALYTICS_URL: http://ms-analytics:8084
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      - ms-users
      - ms-tournament
    networks:
      - chessquery-net

  bff-admin:
    build:
      context: ../bff-admin
      dockerfile: Dockerfile
    container_name: chessquery_bff_admin
    restart: unless-stopped
    profiles: ["admin"]
    environment:
      PORT: "3003"
      MS_USERS_URL: http://ms-users:8081
      MS_TOURNAMENT_URL: http://ms-tournament:8082
      MS_GAME_URL: http://ms-game:8083
      MS_ANALYTICS_URL: http://ms-analytics:8084
      MS_ETL_URL: http://ms-etl:8086
    ports:
      - "127.0.0.1:3003:3003"
    depends_on:
      - ms-users
      - ms-tournament
      - ms-game
    networks:
      - chessquery-net

  # -------------------------------------------------------------------------
  # API GATEWAY (Spring Cloud Gateway, puerto 8080)
  # -------------------------------------------------------------------------

  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: chessquery_api_gateway
    restart: unless-stopped
    environment:
      SERVER_PORT: "8080"
      # MS_AUTH_URL eliminado — Supabase Auth gestiona login/refresh
      MS_USERS_URL: http://ms-users:8081
      BFF_PLAYER_URL: http://bff-player:3001
      BFF_ORGANIZER_URL: http://bff-organizer:3002
      BFF_ADMIN_URL: http://bff-admin:3003
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-chessquery_dev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-chessquery_dev}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175}
      # Supabase Auth — validación JWT local
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:54321}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      SUPABASE_WEBHOOK_SECRET: ${SUPABASE_WEBHOOK_SECRET:-dev-webhook-secret}
    ports:
      - "8080:8080"
    depends_on:
      - bff-player
      - bff-organizer
      - redis
      - ms-users
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 90s

  # -------------------------------------------------------------------------
  # MENSAJERÍA – RabbitMQ 3.13 con Management Plugin
  # -------------------------------------------------------------------------

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: chessquery_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-chessquery_dev}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "127.0.0.1:5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Contenedor one-shot: crea el exchange y las colas con sus bindings.
  rabbitmq_setup:
    image: rabbitmq:3.13-management-alpine
    container_name: chessquery_rabbitmq_setup
    restart: "no"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-chessquery_dev}
      RABBITMQ_HOST: rabbitmq
    volumes:
      - ./scripts/init-rabbitmq.sh:/init-rabbitmq.sh:ro
    entrypoint: ["sh", "/init-rabbitmq.sh"]
    networks:
      - chessquery-net

  # -------------------------------------------------------------------------
  # CACHÉ – Redis 7
  # -------------------------------------------------------------------------

  redis:
    image: redis:7-alpine
    container_name: chessquery_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-chessquery_dev}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-chessquery_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO removido — Supabase Storage gestiona PGN.
  # Para rollback: docker compose -f docker-compose.yml -f docker-compose.backup.yml up

  # -------------------------------------------------------------------------
  # PROXY – Nginx (reverse proxy + frontend estático)
  # -------------------------------------------------------------------------
  # En la demo el frontend corre directo con Vite (npm run dev), asi que nginx
  # no se usa. Lo dejamos opt-in con el profile 'proxy' para que `make up` no
  # lo levante por defecto. Para iniciarlo:
  #   docker compose --profile proxy up -d nginx

  nginx:
    image: nginx:1.27-alpine
    container_name: chessquery_nginx
    restart: unless-stopped
    profiles: ["proxy"]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Descomentar cuando el frontend esté disponible:
      # - ../frontend/dist:/usr/share/nginx/html:ro
    networks:
      - chessquery-net
    depends_on:
      - rabbitmq
      - redis
      - api-gateway
