# =============================================================================
# ChessQuery – Infraestructura local (desarrollo / demo)
#
# Object Storage: MinIO expuesto como S3-compatible.
#   - Los microservicios usan el AWS SDK apuntando a S3_ENDPOINT_URL en local.
#   - En producción basta con quitar S3_ENDPOINT_URL y cambiar las credenciales
#     a las de AWS IAM; el SDK se comporta igual.
#
# Microservicios Java y BFFs NO incluidos; se agregarán con sus Dockerfiles.
# =============================================================================

networks:
  chessquery-net:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes persistentes
# ---------------------------------------------------------------------------
volumes:
  auth_db_data:
  user_db_data:
  tournament_db_data:
  game_db_data:
  analytics_db_data:
  notif_db_data:
  etl_db_data:
  rabbitmq_data:
  redis_data:
  minio_data:

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # -------------------------------------------------------------------------
  # BASES DE DATOS – PostgreSQL 16
  # -------------------------------------------------------------------------

  auth_db:
    image: postgres:16-alpine
    container_name: chessquery_auth_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-chessquery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chessquery} -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  user_db:
    image: postgres:16-alpine
    container_name: chessquery_user_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-chessquery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chessquery} -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  tournament_db:
    image: postgres:16-alpine
    container_name: chessquery_tournament_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-chessquery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      POSTGRES_DB: tournament_db
    ports:
      - "5434:5432"
    volumes:
      - tournament_db_data:/var/lib/postgresql/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chessquery} -d tournament_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  game_db:
    image: postgres:16-alpine
    container_name: chessquery_game_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-chessquery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      POSTGRES_DB: game_db
    ports:
      - "5435:5432"
    volumes:
      - game_db_data:/var/lib/postgresql/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chessquery} -d game_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics_db:
    image: postgres:16-alpine
    container_name: chessquery_analytics_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-chessquery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      POSTGRES_DB: analytics_db
    ports:
      - "5436:5432"
    volumes:
      - analytics_db_data:/var/lib/postgresql/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chessquery} -d analytics_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  notif_db:
    image: postgres:16-alpine
    container_name: chessquery_notif_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-chessquery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      POSTGRES_DB: notif_db
    ports:
      - "5437:5432"
    volumes:
      - notif_db_data:/var/lib/postgresql/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chessquery} -d notif_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  etl_db:
    image: postgres:16-alpine
    container_name: chessquery_etl_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-chessquery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      POSTGRES_DB: etl_db
    ports:
      - "5438:5432"
    volumes:
      - etl_db_data:/var/lib/postgresql/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chessquery} -d etl_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # MICROSERVICIOS JAVA
  # -------------------------------------------------------------------------

  ms_auth:
    build:
      context: ../ms-auth
      dockerfile: Dockerfile
    container_name: chessquery_ms_auth
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://auth_db:5432/auth_db
      DB_USER: ${DB_USER:-chessquery}
      DB_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      JWT_SECRET: ${JWT_SECRET:-Y2hlc3NxdWVyeS1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmctZW5vdWdo}
      SERVER_PORT: "9090"
    ports:
      - "9090:9090"
    depends_on:
      auth_db:
        condition: service_healthy
    networks:
      - chessquery-net

  ms_users:
    build:
      context: ../ms-users
      dockerfile: Dockerfile
    container_name: chessquery_ms_users
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://user_db:5432/user_db
      DB_USER: ${DB_USER:-chessquery}
      DB_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-chessquery_dev}
      SERVER_PORT: "8081"
    ports:
      - "8081:8081"
    depends_on:
      user_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - chessquery-net

  ms_tournament:
    build:
      context: ../ms-tournament
      dockerfile: Dockerfile
    container_name: chessquery_ms_tournament
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://tournament_db:5432/tournament_db
      DB_USER: ${DB_USER:-chessquery}
      DB_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-chessquery_dev}
      MS_USERS_URL: http://ms_users:8081
      SERVER_PORT: "8082"
    ports:
      - "8082:8082"
    depends_on:
      tournament_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - chessquery-net

  ms_game:
    build:
      context: ../ms-game
      dockerfile: Dockerfile
    container_name: chessquery_ms_game
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://game_db:5432/game_db
      DB_USER: ${DB_USER:-chessquery}
      DB_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-chessquery_dev}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-chessquery-pgn}
      S3_PATH_STYLE_ACCESS: "true"
      SERVER_PORT: "8083"
    ports:
      - "8083:8083"
    depends_on:
      game_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - chessquery-net

  ms_analytics:
    build:
      context: ../ms-analytics
      dockerfile: Dockerfile
    container_name: chessquery_ms_analytics
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://analytics_db:5432/analytics_db
      DB_USER: ${DB_USER:-chessquery}
      DB_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-chessquery_dev}
      SERVER_PORT: "8084"
    ports:
      - "8084:8084"
    depends_on:
      analytics_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - chessquery-net

  # -------------------------------------------------------------------------
  # MICROSERVICIO PYTHON — ETL
  # -------------------------------------------------------------------------

  ms_etl:
    build:
      context: ../ms-etl
      dockerfile: Dockerfile
    container_name: chessquery_ms_etl
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-chessquery}:${DB_PASSWORD:-chessquery_dev}@etl_db:5432/etl_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD:-chessquery_dev}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-ChessEvents}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-chessquery_dev}
      MS_USERS_URL: http://ms_users:8081
      ETL_FIDE_SHOULD_FAIL: ${ETL_FIDE_SHOULD_FAIL:-false}
      ETL_AJEFECH_SHOULD_FAIL: ${ETL_AJEFECH_SHOULD_FAIL:-false}
      ETL_LICHESS_SHOULD_FAIL: ${ETL_LICHESS_SHOULD_FAIL:-false}
      ETL_CHESS_RESULTS_SHOULD_FAIL: ${ETL_CHESS_RESULTS_SHOULD_FAIL:-false}
      SERVER_PORT: "8086"
    ports:
      - "8086:8086"
    depends_on:
      etl_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -------------------------------------------------------------------------
  # BFFs (NestJS)
  # -------------------------------------------------------------------------

  bff_player:
    build:
      context: ../bff-player
      dockerfile: Dockerfile
    container_name: chessquery_bff_player
    restart: unless-stopped
    environment:
      PORT: "3001"
      MS_USERS_URL: http://ms_users:8081
      MS_TOURNAMENT_URL: http://ms_tournament:8082
      MS_GAME_URL: http://ms_game:8083
      MS_ANALYTICS_URL: http://ms_analytics:8084
    ports:
      - "3001:3001"
    depends_on:
      - ms_users
      - ms_game
      - ms_analytics
    networks:
      - chessquery-net

  bff_organizer:
    build:
      context: ../bff-organizer
      dockerfile: Dockerfile
    container_name: chessquery_bff_organizer
    restart: unless-stopped
    environment:
      PORT: "3002"
      MS_USERS_URL: http://ms_users:8081
      MS_TOURNAMENT_URL: http://ms_tournament:8082
      MS_GAME_URL: http://ms_game:8083
      MS_ANALYTICS_URL: http://ms_analytics:8084
    ports:
      - "3002:3002"
    depends_on:
      - ms_users
      - ms_tournament
    networks:
      - chessquery-net

  bff_admin:
    build:
      context: ../bff-admin
      dockerfile: Dockerfile
    container_name: chessquery_bff_admin
    restart: unless-stopped
    environment:
      PORT: "3003"
      MS_USERS_URL: http://ms_users:8081
      MS_TOURNAMENT_URL: http://ms_tournament:8082
      MS_GAME_URL: http://ms_game:8083
      MS_ANALYTICS_URL: http://ms_analytics:8084
      MS_ETL_URL: http://ms_etl:8086
    ports:
      - "3003:3003"
    depends_on:
      - ms_users
      - ms_tournament
      - ms_game
      - ms_analytics
      - ms_etl
    networks:
      - chessquery-net

  # -------------------------------------------------------------------------
  # API GATEWAY (Spring Cloud Gateway, puerto 8080)
  # -------------------------------------------------------------------------

  api_gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: chessquery_api_gateway
    restart: unless-stopped
    environment:
      SERVER_PORT: "8080"
      MS_AUTH_URL: http://ms_auth:9090
      BFF_PLAYER_URL: http://bff_player:3001
      BFF_ORGANIZER_URL: http://bff_organizer:3002
      BFF_ADMIN_URL: http://bff_admin:3003
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-chessquery_dev}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost}
    ports:
      - "8080:8080"
    depends_on:
      - ms_auth
      - bff_player
      - bff_organizer
      - bff_admin
      - redis
    networks:
      - chessquery-net

  # -------------------------------------------------------------------------
  # MENSAJERÍA – RabbitMQ 3.13 con Management Plugin
  # -------------------------------------------------------------------------

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: chessquery_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-chessquery_dev}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Contenedor one-shot: crea el exchange y las colas con sus bindings.
  rabbitmq_setup:
    image: rabbitmq:3.13-management-alpine
    container_name: chessquery_rabbitmq_setup
    restart: "no"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_USER: ${RABBITMQ_USER:-chessquery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-chessquery_dev}
      RABBITMQ_HOST: rabbitmq
    volumes:
      - ./scripts/init-rabbitmq.sh:/init-rabbitmq.sh:ro
    entrypoint: ["sh", "/init-rabbitmq.sh"]
    networks:
      - chessquery-net

  # -------------------------------------------------------------------------
  # CACHÉ – Redis 7
  # -------------------------------------------------------------------------

  redis:
    image: redis:7-alpine
    container_name: chessquery_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-chessquery_dev}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-chessquery_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # OBJECT STORAGE – MinIO (S3-compatible)
  #
  # Compatibilidad con AWS S3 SDK:
  #   Los microservicios configuran:
  #     AWS_ACCESS_KEY_ID     = ${S3_ACCESS_KEY}
  #     AWS_SECRET_ACCESS_KEY = ${S3_SECRET_KEY}
  #     S3_ENDPOINT_URL       = http://minio:9000   (solo en local; vacío en prod)
  #     S3_REGION             = us-east-1           (MinIO lo acepta; en prod usar la región real)
  #     S3_BUCKET             = chessquery-pgn
  #   Con path-style habilitado en el SDK (forcePathStyle: true / path_style: true).
  #   En producción: quitar S3_ENDPOINT_URL y usar credenciales IAM de AWS.
  # -------------------------------------------------------------------------

  minio:
    image: minio/minio:latest
    container_name: chessquery_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # Estas vars replican los nombres estándar del AWS SDK para que el
      # cambio a S3 real solo requiera actualizar el .env de producción.
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API  →  http://localhost:9000
      - "9001:9001"   # Console →  http://localhost:9001
    volumes:
      - minio_data:/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # Contenedor one-shot: crea el bucket al primer arranque.
  minio_setup:
    image: minio/mc:latest
    container_name: chessquery_minio_setup
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-chessquery-pgn}
    volumes:
      - ./scripts/init-minio.sh:/init-minio.sh:ro
    entrypoint: ["sh", "/init-minio.sh"]
    networks:
      - chessquery-net

  # -------------------------------------------------------------------------
  # PROXY – Nginx (reverse proxy + frontend estático)
  # -------------------------------------------------------------------------

  nginx:
    image: nginx:1.27-alpine
    container_name: chessquery_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Descomentar cuando el frontend esté disponible:
      # - ../frontend/dist:/usr/share/nginx/html:ro
    networks:
      - chessquery-net
    depends_on:
      - rabbitmq
      - redis
      - minio
      - api_gateway
