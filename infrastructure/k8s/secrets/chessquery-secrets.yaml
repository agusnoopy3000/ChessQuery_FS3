# IMPORTANTE: este Secret usa placeholders. Antes del deploy en AWS reemplaza
# los valores `changeme` por los reales (preferentemente vía
#   kubectl -n chessquery create secret generic chessquery-secrets \
#       --from-literal=DB_PASSWORD=... --from-literal=...
# y NO commitees el archivo con valores reales). Para producción usa
# AWS Secrets Manager + external-secrets, o SOPS.
apiVersion: v1
kind: Secret
metadata:
  name: chessquery-secrets
  namespace: chessquery
type: Opaque
stringData:
  DB_PASSWORD:        "changeme"
  RABBITMQ_PASSWORD:  "changeme"
  SUPABASE_KEY:       "changeme"
  JWT_SECRET:         "changeme"
