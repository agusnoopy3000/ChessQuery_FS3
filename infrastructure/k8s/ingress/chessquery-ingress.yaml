# Ingress Nginx para ChessQuery.
# - /api/*  → api-gateway-service:8080  (todas las APIs)
# - /      → frontend-service:80       (SPA React)
# Para producción: reemplaza chessquery.local por el dominio real
# y agrega un Issuer de cert-manager + tls block.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chessquery-ingress
  namespace: chessquery
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"   # PGNs pueden ser grandes
spec:
  ingressClassName: nginx
  rules:
    - host: chessquery.local        # TODO: reemplazar por dominio real (ej.: chessquery.cl)
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port: { number: 8080 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port: { number: 80 }
