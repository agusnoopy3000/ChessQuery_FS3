# Deployments + Services para todos los microservicios Spring Boot.
# La imagen usa la variable ${ECR_REGISTRY}; sustituir vía envsubst o kustomize
# antes de `kubectl apply` (ej.: `envsubst < java-services.yaml | kubectl apply -f -`).

# ── ms-users ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-users
  namespace: chessquery
  labels: { app: ms-users }
spec:
  replicas: 1
  selector: { matchLabels: { app: ms-users } }
  template:
    metadata:
      labels: { app: ms-users }
    spec:
      containers:
        - name: ms-users
          image: ${ECR_REGISTRY}/chessquery/ms-users:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef: { name: chessquery-config }
          env:
            - name: JAVA_OPTS
              value: "-Xmx384m -Xms128m"
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: chessquery-secrets, key: DB_PASSWORD } }
            - name: RABBITMQ_PASSWORD
              valueFrom: { secretKeyRef: { name: chessquery-secrets, key: RABBITMQ_PASSWORD } }
            - name: SUPABASE_KEY
              valueFrom: { secretKeyRef: { name: chessquery-secrets, key: SUPABASE_KEY } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: chessquery-secrets, key: JWT_SECRET } }
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits:   { memory: "512Mi", cpu: "500m" }
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata: { name: ms-users-service, namespace: chessquery }
spec:
  type: ClusterIP
  selector: { app: ms-users }
  ports: [{ port: 8081, targetPort: 8081 }]

