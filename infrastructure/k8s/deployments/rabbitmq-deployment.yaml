apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-pvc
  namespace: chessquery
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-storage
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: chessquery
  labels: { app: rabbitmq }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: rabbitmq } }
  template:
    metadata: { labels: { app: rabbitmq } }
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.12-management-alpine
          ports:
            - { name: amqp,  containerPort: 5672 }
            - { name: mgmt,  containerPort: 15672 }
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "chessquery"
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom: { secretKeyRef: { name: chessquery-secrets, key: RABBITMQ_PASSWORD } }
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits:   { memory: "512Mi", cpu: "500m" }
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
          livenessProbe:
            tcpSocket: { port: 5672 }
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            tcpSocket: { port: 5672 }
            initialDelaySeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: rabbitmq-pvc }
---
apiVersion: v1
kind: Service
metadata: { name: rabbitmq-service, namespace: chessquery }
spec:
  type: ClusterIP
  selector: { app: rabbitmq }
  ports:
    - { name: amqp, port: 5672,  targetPort: 5672 }
    - { name: mgmt, port: 15672, targetPort: 15672 }
