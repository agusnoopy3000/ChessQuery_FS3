apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: chessquery
  labels: { app: redis }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--save", "", "--appendonly", "no"]   # cache puro, sin persistencia
          ports: [{ containerPort: 6379 }]
          resources:
            requests: { memory: "32Mi", cpu: "25m" }
            limits:   { memory: "128Mi", cpu: "250m" }
          livenessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 10
          readinessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: redis-service, namespace: chessquery }
spec:
  type: ClusterIP
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
