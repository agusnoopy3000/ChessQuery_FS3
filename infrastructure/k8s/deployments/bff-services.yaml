# ── ms-etl (Python FastAPI) ──────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-etl
  namespace: chessquery
  labels: { app: ms-etl }
spec:
  replicas: 1
  selector: { matchLabels: { app: ms-etl } }
  template:
    metadata: { labels: { app: ms-etl } }
    spec:
      containers:
        - name: ms-etl
          image: ${ECR_REGISTRY}/chessquery/ms-etl:latest
          imagePullPolicy: Always
          ports: [{ containerPort: 8086 }]
          envFrom: [{ configMapRef: { name: chessquery-config } }]
          env:
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: chessquery-secrets, key: DB_PASSWORD } }
            - name: RABBITMQ_PASSWORD
              valueFrom: { secretKeyRef: { name: chessquery-secrets, key: RABBITMQ_PASSWORD } }
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "500m" }
          livenessProbe:
            httpGet: { path: /health, port: 8086 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 8086 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: ms-etl-service, namespace: chessquery }
spec:
  type: ClusterIP
  selector: { app: ms-etl }
  ports: [{ port: 8086, targetPort: 8086 }]

# ── frontend (nginx sirviendo SPA) ───────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: chessquery
  labels: { app: frontend }
spec:
  replicas: 1
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: ${ECR_REGISTRY}/chessquery/frontend:latest
          imagePullPolicy: Always
          ports: [{ containerPort: 80 }]
          resources:
            requests: { memory: "32Mi", cpu: "25m" }
            limits:   { memory: "128Mi", cpu: "250m" }
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: frontend-service, namespace: chessquery }
spec:
  type: ClusterIP
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 80 }]
