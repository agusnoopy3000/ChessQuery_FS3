# Deployments + Services para BFFs NestJS y ms-etl Python.

# ── bff-player ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-player
  namespace: chessquery
  labels: { app: bff-player }
spec:
  replicas: 1
  selector: { matchLabels: { app: bff-player } }
  template:
    metadata: { labels: { app: bff-player } }
    spec:
      containers:
        - name: bff-player
          image: ${ECR_REGISTRY}/chessquery/bff-player:latest
          imagePullPolicy: Always
          ports: [{ containerPort: 3001 }]
          envFrom: [{ configMapRef: { name: chessquery-config } }]
          env:
            - name: PORT
              value: "3001"
            - name: SUPABASE_KEY
              valueFrom: { secretKeyRef: { name: chessquery-secrets, key: SUPABASE_KEY } }
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "500m" }
          livenessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: bff-player-service, namespace: chessquery }
spec:
  type: ClusterIP
  selector: { app: bff-player }
  ports: [{ port: 3001, targetPort: 3001 }]

