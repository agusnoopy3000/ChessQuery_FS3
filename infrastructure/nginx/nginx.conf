# =============================================================================
# ChessQuery – Nginx Reverse Proxy
#
# Responsabilidades:
#   1. Servir el frontend estático (build de React/Next/Vue)
#   2. Redirigir /api/* al API Gateway en puerto 8080
#   3. Redirigir /storage/* a MinIO (acceso directo opcional)
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Límite de tamaño para uploads de PGN
    client_max_body_size 10M;

    # ---------------------------------------------------------------------------
    # Upstream: API Gateway (microservicio Java, port 8080)
    # Se agrega cuando los microservicios se incorporen al compose.
    # ---------------------------------------------------------------------------
    upstream api_gateway {
        server host.docker.internal:8080;
        # En producción o cuando el gateway esté en el compose:
        # server api-gateway:8080;
    }

    # ---------------------------------------------------------------------------
    # Upstream: MinIO S3 API (acceso opcional desde el navegador vía proxy)
    # ---------------------------------------------------------------------------
    upstream minio_s3 {
        server minio:9000;
    }

    server {
        listen 80;
        server_name localhost;

        # ------------------------------------------------------------------
        # 1. Proxy /api/* → API Gateway
        #    El header Host se preserva; X-Forwarded-* permiten al gateway
        #    reconstruir la URL original.
        # ------------------------------------------------------------------
        location /api/ {
            proxy_pass         http://api_gateway/api/;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support (para notificaciones en tiempo real)
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_read_timeout  120s;
            proxy_connect_timeout 10s;
        }

        # ------------------------------------------------------------------
        # 2. Proxy /storage/* → MinIO (URLs pre-firmadas pasan por aquí)
        #    Solo expone rutas GET; los uploads deben hacerse con URLs
        #    pre-firmadas obtenidas desde el backend.
        # ------------------------------------------------------------------
        location /storage/ {
            proxy_pass         http://minio_s3/;
            proxy_http_version 1.1;

            proxy_set_header   Host              minio:9000;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Solo permite lecturas desde el proxy
            limit_except GET HEAD {
                deny all;
            }
        }

        # ------------------------------------------------------------------
        # 3. Frontend estático
        #    Descomentar el volume en docker-compose.yml cuando el build
        #    del frontend esté disponible.
        # ------------------------------------------------------------------
        location / {
            root   /usr/share/nginx/html;
            index  index.html;

            # SPA fallback: todas las rutas no encontradas → index.html
            try_files $uri $uri/ /index.html;

            # Cache para assets con hash en el nombre (build de Vite/webpack)
            location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ------------------------------------------------------------------
        # Health check endpoint (usado por orquestadores / load balancers)
        # ------------------------------------------------------------------
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}