# =============================================================================
# Backup de servicios pre-Supabase (MS-Auth + MinIO)
#
# Preservado para facilitar el rollback descrito en docs/ROLLBACK.md.
# Este archivo NO se usa en operación normal — sólo se levanta a mano para
# restaurar el estado anterior a la migración a Supabase Auth + Storage.
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.backup.yml up
#
# Reactiva:
#   - auth_db (PostgreSQL puerto 5432)
#   - ms-auth (puerto 9090)
#   - minio (puertos 9000 / 9001)
#   - minio_setup (one-shot: crea bucket chessquery-pgn)
# =============================================================================

services:

  auth_db:
    image: postgres:16-alpine
    container_name: chessquery_auth_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${DB_USER:-chessquery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - chessquery-net

  ms-auth:
    build:
      context: ../ms-auth
      dockerfile: Dockerfile
    container_name: chessquery_ms_auth
    restart: unless-stopped
    depends_on:
      - auth_db
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://auth_db:5432/auth_db
      DB_USER: ${DB_USER:-chessquery}
      DB_PASSWORD: ${DB_PASSWORD:-chessquery_dev}
      JWT_SECRET: ${JWT_SECRET:-chessquery-jwt-secret-min-32-chars-long}
      SERVER_PORT: 9090
    ports:
      - "9090:9090"
    networks:
      - chessquery-net

  minio:
    image: minio/minio:latest
    container_name: chessquery_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - chessquery-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  minio_setup:
    image: minio/mc:latest
    container_name: chessquery_minio_setup
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-chessquery-pgn}
    volumes:
      - ./scripts/init-minio.sh:/init-minio.sh:ro
    entrypoint: ["sh", "/init-minio.sh"]
    networks:
      - chessquery-net

volumes:
  auth_db_data:
  minio_data:

networks:
  chessquery-net:
    external: true
    name: chessquery_chessquery-net
