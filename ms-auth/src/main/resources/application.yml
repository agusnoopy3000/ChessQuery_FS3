spring:
  application:
    name: ms-auth

  # ── Datasource ──────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USER:chessquery}
    password: ${DB_PASSWORD:chessquery_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  # ── JPA ─────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway gestiona el esquema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ── Servidor ────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:9090}
  error:
    include-message: never      # No exponer stack trace en producción

# ── JWT ─────────────────────────────────────────────────────────────────────
# El secret debe ser una clave Base64 de al menos 256 bits (32 bytes).
# Rotar en producción con variable de entorno JWT_SECRET.
app:
  jwt:
    secret: ${JWT_SECRET:Y2hlc3NxdWVyeS1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmctZW5vdWdo}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}

# ── SpringDoc / Swagger ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    cl.chessquery.auth: DEBUG
    org.springframework.security: WARN

---
# ── Perfil Docker (usado dentro de docker-compose) ──────────────────────────
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://auth_db:5432/auth_db

---
# ── Perfil test (H2 en memoria, Flyway deshabilitado) ───────────────────────
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
